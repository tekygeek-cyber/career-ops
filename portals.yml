# Portal Scanner Configuration — Pranesh Nallamuthu
# Scope: EU-wide | OEM + Tier-1 Automotive/Industrial | Materials Compliance roles
# Last updated: 2026-05-06
# To restart scan: run `node scan.mjs` or equivalent scan command

title_filter:
  positive:
    - materials compliance
    - material compliance
    - REACH
    - RoHS
    - ELV
    - IMDS
    - substance compliance
    - product compliance
    - regulatory compliance
    - environmental compliance
    - chemical compliance
    - product stewardship
    - sustainability compliance
    - hazardous substance
    - restricted substances
  negative:
    - senior manager
    - director
    - VP
    - head of
    - intern
    - apprentice
    - Praktikant
    - Werkstudent
    - student

location_filter:
  countries:
    - DE  # Germany
    - NL  # Netherlands
    - BE  # Belgium
    - AT  # Austria
    - SE  # Sweden
    - DK  # Denmark
    - FR  # France
    - CZ  # Czech Republic
    - PL  # Poland
    - HU  # Hungary
    - SK  # Slovakia
    - SI  # Slovenia
    - FI  # Finland
    - IT  # Italy
    - ES  # Spain
  remote: true

# ─── JOB PORTALS (general + LinkedIn) ────────────────────────────────────────
portals:
  - name: LinkedIn Jobs
    type: linkedin
    search_url: "https://www.linkedin.com/jobs/search/?keywords=materials+compliance+REACH+RoHS&location=Europe&f_WT=1%2C2%2C3&sortBy=DD"
    note: Search LinkedIn with keywords REACH RoHS materials compliance, all EU, sort by date

  - name: XING Jobs
    type: websearch
    search_url: "https://www.xing.com/jobs/search?keywords=materials+compliance+REACH&location=Europa"
    note: XING — strong in DACH region

  - name: StepStone DE
    type: websearch
    search_url: "https://www.stepstone.de/jobs/materials-compliance"
    note: Major German job board

  - name: Indeed EU
    type: websearch
    search_url: "https://de.indeed.com/jobs?q=materials+compliance+REACH+RoHS&l=Deutschland"
    note: Indeed Germany

  - name: EuroEngineerJobs
    type: websearch
    search_url: "https://www.eurengineersjobs.com/jobs/?keywords=compliance+REACH"
    note: Engineering-focused EU jobs

